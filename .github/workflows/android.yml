name: Android CI Build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Create .env from template
        run: cp .env.example .env || touch .env

      - name: Restore debug.keystore if base64 placeholder exists
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64 to recreate debug.keystore using python..."
            python3 -c "
          import base64
          try:
              data = open('debug.keystore.base64', 'rb').read().replace(b'\r', b'').replace(b'\n', b'').strip()
              decoded = base64.b64decode(data)
              open('debug.keystore', 'wb').write(decoded)
              print('Successfully decoded and created debug.keystore of size:', len(decoded))
          except Exception as e:
              print('Warning or Error decoding keystore base64:', e)
            "
          else
            echo "No debug.keystore.base64 found. Will fall back to standard gradle debug signing."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
