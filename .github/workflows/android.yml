name: Android CI Build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Create .env from template
        run: cp .env.example .env || touch .env

      - name: Restore debug.keystore if base64 placeholder exists
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64 to recreate debug.keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found. Will fall back to standard gradle debug signing."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
